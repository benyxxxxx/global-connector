# fly.toml app configuration file generated for globalconnector-agent on 2025-07-19T15:26:19+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'router-agent'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080 
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # This section defines a health check to ensure your app is running correctly
  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "get"
    path = "/health" 
    protocol = "http"

# This section defines the virtual machine resources for your app
[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1