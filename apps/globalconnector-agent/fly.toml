# fly.toml app configuration file generated for globalconnector-agent on 2025-07-19T15:26:19+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'globalconnector-agent'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1


[mounts]
  source = "data_volume"
  destination = "/app/data"